services:
  proxy:
    build: .
    container_name: amazon-ads-ai-proxy
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:9090/health', timeout=3); sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
